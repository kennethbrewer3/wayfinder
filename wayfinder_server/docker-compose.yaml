# Wayfinder server stack (Postgres, Redis, Serverpod).
#
# Pull pre-built image (default):
#   cp .env.example .env
#   docker compose pull && docker compose up -d
#
# Build from source (developers changing server code):
#   docker compose -f docker-compose.yaml -f docker-compose.build.yaml up -d --build
#
# End users without a git clone: use deploy/server/ — see ../DEPLOY.md

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${WAYFINDER_DB_PORT:-18090}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: wayfinder
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    volumes:
      - ${WAYFINDER_DATA_PATH:-./storage/data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wayfinder"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:6.2.6
    ports:
      - "${WAYFINDER_REDIS_PORT:-18091}:6379"
    command: redis-server --requirepass "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"
    environment:
      - REDIS_REPLICATION_MODE=master
    volumes:
      - ${WAYFINDER_DATA_PATH:-./storage/data}/redis:/data
    restart: unless-stopped

  server:
    image: ${WAYFINDER_SERVER_IMAGE:-ghcr.io/kennethbrewer3/wayfinder-server:latest}
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SERVERPOD_API_SERVER_PORT:-18080}:18080"
      - "${SERVERPOD_INSIGHTS_SERVER_PORT:-18081}:18081"
      - "${SERVERPOD_WEB_SERVER_PORT:-18082}:18082"
    environment:
      runmode: development
      SERVERPOD_RUN_MODE: development
      SERVERPOD_APPLY_MIGRATIONS: "true"
      SERVERPOD_DATABASE_HOST: postgres
      SERVERPOD_DATABASE_PORT: "5432"
      SERVERPOD_DATABASE_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      SERVERPOD_PASSWORD_redis: "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"
      SERVERPOD_PASSWORD_serviceSecret: "${SERVERPOD_PASSWORD_serviceSecret:?Set SERVERPOD_PASSWORD_serviceSecret in .env}"
      SERVERPOD_PASSWORD_emailSecretHashPepper: "${SERVERPOD_PASSWORD_emailSecretHashPepper:?Set SERVERPOD_PASSWORD_emailSecretHashPepper in .env}"
      SERVERPOD_PASSWORD_jwtHmacSha512PrivateKey: "${SERVERPOD_PASSWORD_jwtHmacSha512PrivateKey:?Set SERVERPOD_PASSWORD_jwtHmacSha512PrivateKey in .env}"
      SERVERPOD_PASSWORD_jwtRefreshTokenHashPepper: "${SERVERPOD_PASSWORD_jwtRefreshTokenHashPepper:?Set SERVERPOD_PASSWORD_jwtRefreshTokenHashPepper in .env}"
      SERVERPOD_API_SERVER_PORT: "18080"
      SERVERPOD_INSIGHTS_SERVER_PORT: "18081"
      SERVERPOD_WEB_SERVER_PORT: "18082"
      SERVERPOD_API_SERVER_PUBLIC_HOST: "${SERVERPOD_API_SERVER_PUBLIC_HOST:-localhost}"
      SERVERPOD_API_SERVER_PUBLIC_PORT: "${SERVERPOD_API_SERVER_PUBLIC_PORT:-18080}"
      SERVERPOD_API_SERVER_PUBLIC_SCHEME: "${SERVERPOD_API_SERVER_PUBLIC_SCHEME:-http}"
      SERVERPOD_WEB_SERVER_PUBLIC_HOST: "${SERVERPOD_WEB_SERVER_PUBLIC_HOST:-localhost}"
      SERVERPOD_WEB_SERVER_PUBLIC_PORT: "${SERVERPOD_WEB_SERVER_PUBLIC_PORT:-18082}"
      SERVERPOD_WEB_SERVER_PUBLIC_SCHEME: "${SERVERPOD_WEB_SERVER_PUBLIC_SCHEME:-http}"
      WAYFINDER_PMTILES_STORAGE: /data/pmtiles
    volumes:
      - ${WAYFINDER_PMTILES_HOST_PATH:-${WAYFINDER_DATA_PATH:-./storage/data}/pmtiles}:/data/pmtiles
    restart: unless-stopped

  # Integration tests only — not started during normal deployment.
  postgres_test:
    profiles:
      - test
    image: pgvector/pgvector:pg16
    ports:
      - "${WAYFINDER_DB_TEST_PORT:-19090}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: wayfinder_test
      POSTGRES_PASSWORD: "${POSTGRES_TEST_PASSWORD:?Set POSTGRES_TEST_PASSWORD in .env for the test profile}"
    volumes:
      - ${WAYFINDER_DATA_PATH:-./storage/data}/postgres_test:/var/lib/postgresql/data

  redis_test:
    profiles:
      - test
    image: redis:6.2.6
    ports:
      - "${WAYFINDER_REDIS_TEST_PORT:-19091}:6379"
    command: redis-server --requirepass "${REDIS_TEST_PASSWORD:?Set REDIS_TEST_PASSWORD in .env for the test profile}"
    environment:
      - REDIS_REPLICATION_MODE=master
    volumes:
      - ${WAYFINDER_DATA_PATH:-./storage/data}/redis_test:/data
