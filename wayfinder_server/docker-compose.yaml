services:
  # Start everything: docker compose up -d --build
  #
  # Copy `.env.example` to `.env` and adjust paths/ports.
  #
  # Map tiles: set WAYFINDER_PMTILES_HOST_PATH to a host folder containing
  # `.pmtiles` files (pre-downloaded archives). They are mounted into the
  # server container and registered automatically at startup.
  # Example: WAYFINDER_PMTILES_HOST_PATH=/Volumes/maptiles
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${WAYFINDER_DB_PORT:-18090}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: wayfinder
      POSTGRES_PASSWORD: "hoMP8M6XziidHgRLWdYWIChJN64gcPhV"
    volumes:
      - wayfinder_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wayfinder"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:6.2.6
    ports:
      - "${WAYFINDER_REDIS_PORT:-18091}:6379"
    command: redis-server --requirepass "jZSPtad_20Z4JmPOazsDurPauqOk9FlM"
    environment:
      - REDIS_REPLICATION_MODE=master

  server:
    build:
      context: ..
      dockerfile: wayfinder_server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SERVERPOD_API_SERVER_PORT:-18080}:18080"
      - "${SERVERPOD_INSIGHTS_SERVER_PORT:-18081}:18081"
      - "${SERVERPOD_WEB_SERVER_PORT:-18082}:18082"
    environment:
      runmode: development
      SERVERPOD_RUN_MODE: development
      SERVERPOD_APPLY_MIGRATIONS: "true"
      SERVERPOD_DATABASE_HOST: postgres
      SERVERPOD_DATABASE_PORT: "5432"
      SERVERPOD_DATABASE_PASSWORD: "hoMP8M6XziidHgRLWdYWIChJN64gcPhV"
      SERVERPOD_API_SERVER_PORT: "18080"
      SERVERPOD_INSIGHTS_SERVER_PORT: "18081"
      SERVERPOD_WEB_SERVER_PORT: "18082"
      SERVERPOD_API_SERVER_PUBLIC_HOST: localhost
      SERVERPOD_API_SERVER_PUBLIC_PORT: "${SERVERPOD_API_SERVER_PORT:-18080}"
      SERVERPOD_API_SERVER_PUBLIC_SCHEME: http
      SERVERPOD_WEB_SERVER_PUBLIC_HOST: localhost
      SERVERPOD_WEB_SERVER_PUBLIC_PORT: "${SERVERPOD_WEB_SERVER_PORT:-18082}"
      SERVERPOD_WEB_SERVER_PUBLIC_SCHEME: http
      WAYFINDER_PMTILES_STORAGE: /data/pmtiles
    volumes:
      - ${WAYFINDER_PMTILES_HOST_PATH:-./storage/pmtiles}:/data/pmtiles
    restart: unless-stopped

  # Flutter web client (nginx). Start with: docker compose --profile client up -d --build
  # Set WAYFINDER_API_URL / WAYFINDER_WEB_URL to the server host reachable from the browser.
  client:
    profiles:
      - client
    build:
      context: ..
      dockerfile: wayfinder_flutter/Dockerfile
    ports:
      - "${WAYFINDER_CLIENT_PORT:-8080}:8080"
    environment:
      WAYFINDER_API_URL: ${WAYFINDER_API_URL:-http://localhost:18080}
      WAYFINDER_WEB_URL: ${WAYFINDER_WEB_URL:-http://localhost:18082}
    restart: unless-stopped

  # Test services (not started during normal dev — use: docker compose --profile test up -d)
  postgres_test:
    profiles:
      - test
    image: pgvector/pgvector:pg16
    ports:
      - "${WAYFINDER_DB_TEST_PORT:-19090}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: wayfinder_test
      POSTGRES_PASSWORD: "mA8uwnnQaPPF-RJuCw0xBQ8qV5ol7EH-"
    volumes:
      - wayfinder_test_data:/var/lib/postgresql/data

  redis_test:
    profiles:
      - test
    image: redis:6.2.6
    ports:
      - "${WAYFINDER_REDIS_TEST_PORT:-19091}:6379"
    command: redis-server --requirepass "68i8nW9rJ80VZ_UEGd9xKshW1FvTdP0a"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  wayfinder_data:
  wayfinder_test_data:
