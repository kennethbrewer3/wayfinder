# Wayfinder Flutter web client — pull pre-built image from GitHub Container Registry.
#
# Quick start (no git clone):
#   mkdir wayfinder-client && cd wayfinder-client
#   curl -fsSLO https://raw.githubusercontent.com/kennethbrewer3/wayfinder/main/deploy/client/docker-compose.yaml
#   curl -fsSLO https://raw.githubusercontent.com/kennethbrewer3/wayfinder/main/deploy/client/.env.example
#   curl -fsSLO https://raw.githubusercontent.com/kennethbrewer3/wayfinder/main/deploy/client/stop.sh
#   curl -fsSLO https://raw.githubusercontent.com/kennethbrewer3/wayfinder/main/deploy/client/docker_lib.sh
#   cp .env.example .env
#   chmod +x start.sh stop.sh
#   ./start.sh
#
# Or manually:
#   docker compose pull
#   export WAYFINDER_DOCKER_IMAGE_ID="$(docker image inspect "${WAYFINDER_CLIENT_IMAGE:-ghcr.io/kennethbrewer3/wayfinder-client:latest}" --format '{{.Id}}')"
#   docker compose up -d --force-recreate
#
# Open http://localhost:8080 (or your WAYFINDER_CLIENT_PORT)

name: wayfinder-client

services:
  wayfinder-client:
    container_name: wayfinder-client
    image: ${WAYFINDER_CLIENT_IMAGE:-ghcr.io/kennethbrewer3/wayfinder-client:latest}
    ports:
      - target: 8080
        published: ${WAYFINDER_CLIENT_PORT:-8080}
        protocol: tcp
    environment:
      WAYFINDER_API_URL: ${WAYFINDER_API_URL:?Set WAYFINDER_API_URL in .env — e.g. http://192.168.1.10:18080}
      WAYFINDER_WEB_URL: ${WAYFINDER_WEB_URL:-}
      WAYFINDER_GEOCODING_WEB_URL: ${WAYFINDER_GEOCODING_WEB_URL:-}
      WAYFINDER_DOCKER_IMAGE_ID: ${WAYFINDER_DOCKER_IMAGE_ID:-}
      WAYFINDER_DOCKER_IMAGE_REF: ${WAYFINDER_CLIENT_IMAGE:-ghcr.io/kennethbrewer3/wayfinder-client:latest}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
