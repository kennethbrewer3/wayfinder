name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VERSION: '3.4.8'
      SERVERPOD_PASSWORD_database: 'hoMP8M6XziidHgRLWdYWIChJN64gcPhV'
      SERVERPOD_PASSWORD_redis: 'jZSPtad_20Z4JmPOazsDurPauqOk9FlM'
      POSTGRES_PASSWORD: 'hoMP8M6XziidHgRLWdYWIChJN64gcPhV'
      REDIS_PASSWORD: 'jZSPtad_20Z4JmPOazsDurPauqOk9FlM'
      POSTGRES_TEST_PASSWORD: 'hoMP8M6XziidHgRLWdYWIChJN64gcPhV'
      REDIS_TEST_PASSWORD: 'jZSPtad_20Z4JmPOazsDurPauqOk9FlM'
      SERVERPOD_PASSWORD_serviceSecret: 'ci-test-service-secret'
      SERVERPOD_PASSWORD_emailSecretHashPepper: 'ci-test-email-pepper'
      SERVERPOD_PASSWORD_jwtHmacSha512PrivateKey: 'ci-test-jwt-signing-key'
      SERVERPOD_PASSWORD_jwtRefreshTokenHashPepper: 'ci-test-jwt-refresh-pepper'

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.8.0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: false

      - name: Start test database
        working-directory: wayfinder_server
        run: |
          docker compose --profile test up -d postgres_test
          for i in $(seq 1 30); do
            if docker compose exec -T postgres_test pg_isready -U postgres -d wayfinder_test; then
              exit 0
            fi
            sleep 1
          done
          docker compose logs postgres_test
          exit 1

      - name: Install server dependencies
        working-directory: wayfinder_server
        run: |
          sed -i '/^resolution: workspace$/d' pubspec.yaml
          dart pub get

      - name: Install Serverpod CLI
        run: dart pub global activate serverpod_cli $VERSION

      - name: Add pub global bin to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Run Serverpod generator
        working-directory: wayfinder_server
        run: serverpod generate

      - name: Run tests
        working-directory: wayfinder_server
        run: dart test

      - name: Stop containers
        if: always()
        working-directory: wayfinder_server
        run: docker compose --profile test down -v
