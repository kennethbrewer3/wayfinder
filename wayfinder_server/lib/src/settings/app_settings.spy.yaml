class: AppSettings
table: app_settings
fields:
  id: int?
  homeLatitude: double
  homeLongitude: double
  homeZoom: double
  pmtilesStoragePath: String
  measurementUnits: String, default="metric"
  angleDisplayFormat: String, default="decimal"
  circleSizeDisplay: String, default="radius"
  appTheme: String, default="light"
  appLocale: String, default="system"
  lineArrowDensity: int, default=3
  updatedAt: DateTime
