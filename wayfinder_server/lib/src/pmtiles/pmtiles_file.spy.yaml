class: PmtilesFile
table: pmtiles_file
fields:
  id: UuidValue, defaultModel=random
  name: String
  sizeBytes: int
  isActive: bool
  addedAt: DateTime
  minZoom: int?
  maxZoom: int?
  minLatitude: double?
  minLongitude: double?
  maxLatitude: double?
  maxLongitude: double?
  groupIds: List<UuidValue>?, !persist

indexes:
  pmtiles_file_name_idx:
    fields: name
